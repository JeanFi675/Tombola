name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute password hash (SHA-256)
        run: |
          HASH=$(echo -n "${{ secrets.SITE_PASSWORD }}" | sha256sum | awk '{print $1}')
          echo "NEXT_PUBLIC_SITE_PASSWORD_HASH=$HASH" >> $GITHUB_ENV

      - name: Build
        env:
          NEXT_PUBLIC_NOCODB_URL: ${{ secrets.NOCODB_URL }}
          NEXT_PUBLIC_NOCODB_TOKEN: ${{ secrets.NOCODB_TOKEN }}
          NEXT_PUBLIC_NOCODB_TABLE_ID: ${{ secrets.NOCODB_TABLE_ID }}
          # Préfixe automatique basé sur le nom du repo (ex: /Tombola)
          # Mettre BASE_PATH="" comme secret si tu utilises un domaine custom
          NEXT_PUBLIC_BASE_PATH: ${{ secrets.BASE_PATH || format('/{0}', github.event.repository.name) }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
